<h2>Contact Management</h2>

<input [(ngModel)]="searchText" placeholder="Search..." />

<table border="1">
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let contact of contacts | slice:0:5">

    <td>{{ contact.name | titlecase }}</td>
    <td>{{ contact.email | lowercase }}</td>
    <td>{{ contact.phone }}</td>

    <td>
      <span [style.color]="contact.status ? 'green' : 'red'">
        {{ contact.status ? 'Active' : 'Inactive' }}
      </span>
    </td>

    <td>
      <button (click)="toggleStatus(contact)">Toggle</button>
    </td>

  </tr>
</table>
